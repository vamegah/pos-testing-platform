# docker-compose.api.yml
# API-only overlay - adds API microservices
# Usage: docker compose -f docker-compose.yml -f docker-compose.api.yml up -d

version: '3.8'

services:
  # ============================================================
  # Phase 23: API Gateway
  # ============================================================
  api-gateway:
    build:
      context: ./simulators/gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "5014:5014"
    environment:
      - PORT=5014
      - DEBUG=${DEBUG:-false}
      - PRICING_SERVICE_URL=http://pricing-service:8081
      - PROMOTIONS_SERVICE_URL=http://promotions-service:8082
      - TAX_SERVICE_URL=http://tax-service:8083
      - PAYMENT_GATEWAY_URL=http://payment-gateway:8084
    networks:
      - pos-network
    depends_on:
      - pricing-service
      - promotions-service
      - tax-service
      - payment-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5014/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================================
  # Phase 23: Microservices
  # ============================================================
  inventory:
    build:
      context: ./simulators/pos-services/inventory
      dockerfile: Dockerfile
    container_name: inventory
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - DEBUG=${DEBUG:-false}
      - GATEWAY_URL=http://api-gateway:5014
    networks:
      - pos-network
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  order-processing:
    build:
      context: ./simulators/pos-services/order-processing
      dockerfile: Dockerfile
    container_name: order-processing
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - DEBUG=${DEBUG:-false}
      - GATEWAY_URL=http://api-gateway:5014
      - INVENTORY_URL=http://inventory:8085
    networks:
      - pos-network
    depends_on:
      - api-gateway
      - inventory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  crm:
    build:
      context: ./simulators/pos-services/crm
      dockerfile: Dockerfile
    container_name: crm
    ports:
      - "8087:8087"
    environment:
      - PORT=8087
      - DEBUG=${DEBUG:-false}
      - GATEWAY_URL=http://api-gateway:5014
    networks:
      - pos-network
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped