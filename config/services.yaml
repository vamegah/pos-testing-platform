# config/services.yaml
# Service Registry — Single Source of Truth for all service ports/base-URLs
#
# This file defines every service in the POS test platform.
# Changing a port in one place (here) is sufficient — no hard-coded port survives elsewhere.
#
# Usage:
#   - Read this file to discover service URLs
#   - docker-compose.yml references these ports
#   - All test classes read from this registry
#   - All simulators read from this registry

version: "1.0"
description: "POS Test Platform Service Registry"

