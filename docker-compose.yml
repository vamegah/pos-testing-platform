# docker-compose.yml
# Base docker-compose file - core services required for basic operation
# Usage: docker compose up -d

version: '3.8'

services:
  # ============================================================
  # Phase 1: Mocked Backend Services (always needed)
  # ============================================================
  pricing-service:
    build:
      context: ./simulators/pos-services/pricing
      dockerfile: Dockerfile
    container_name: pricing-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DEBUG=${DEBUG:-false}
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  promotions-service:
    build:
      context: ./simulators/pos-services/promotions
      dockerfile: Dockerfile
    container_name: promotions-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DEBUG=${DEBUG:-false}
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  tax-service:
    build:
      context: ./simulators/pos-services/tax
      dockerfile: Dockerfile
    container_name: tax-service
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DEBUG=${DEBUG:-false}
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  payment-gateway:
    build:
      context: ./simulators/pos-services/payment
      dockerfile: Dockerfile
    container_name: payment-gateway
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - DEBUG=${DEBUG:-false}
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  pos-network:
    name: pos-network
    driver: bridge